<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="icon" href="/QA/favicon.ico">
    <title>Fortbildung</title>
    <script src="/QA/js/preload.js"></script>
    <link rel="stylesheet" href="/QA/style/style.css">
</head>

<body>

<div id="nav"></div>

<div class="layout initial-hidden">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
    <div class="content-inner">

        <h1>Quantum Annealing</h1>
        <p>Interaktives Fortbildungsmodul für Fachkräfte der Chemieindustrie</p>


        <div class="card">
            <h2>Lernpfad</h2>

            <p>
                <a class="button" href="Kapitel/Theorie/">Theorie</a>
	        → 
                <a class="button" href="Kapitel/Umsetzung/">Umsetzung</a>
	        → 
                <a class="button" href="Kapitel/Anwendung/">Anwendung</a>
	        →
                <a class="button" href="Kapitel/Selbsttest/">Selbsttest</a>
            </p>

        </div>
    
        <div class="card">
            <h2>Eine Liste</h2>

            <ol>
                <li>Eins</li>
                <li>Zwei</li>
                <li>Drei</li>
            </ol>

        </div>

        <div class="card">
            <h2>Lernfortschritt</h2>

            <p id="quiz_theorie_status">Theorie: nicht abgeschlossen</p>
            <p id="quiz_umsetzung_status">Umsetzung: nicht abgeschlossen</p>
            <p id="quiz_anwendung_status">Anwendung: nicht abgeschlossen</p>

        </div>

    </div>
    </main>

</div>




<script src="/QA/js/app.js"></script>
<script>

// Fortschritt tracken
function updateProgress(){

    // Theorie
    let quiz_theorie_done = localStorage.getItem("theorie_done");

    if(quiz_theorie_done){
        document.getElementById("quiz_theorie_status").textContent = "Theorie: abgeschlossen";
        document.getElementById("quiz_theorie_status").style.color = "green";
    }

    // Umsetzung
    let quiz_umsetzung_done = localStorage.getItem("umsetzung_done");

    if(quiz_umsetzung_done){
        document.getElementById("quiz_umsetzung_status").textContent = "Umsetzung: abgeschlossen";
        document.getElementById("quiz_umsetzung_status").style.color = "green";
    }

    // Anwendung
    let quiz_anwendung_done = localStorage.getItem("anwendung_done");

    if(quiz_anwendung_done){
        document.getElementById("quiz_anwendung_status").textContent = "Anwendung: abgeschlossen";
        document.getElementById("quiz_anwendung_status").style.color = "green";
    }
}

updateProgress();

</script>

</body>
</html>
