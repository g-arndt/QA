<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="icon" href="/QA/favicon.ico">
    <title>Quiz</title>
    <script src="/QA/js/preload.js"></script>
    <link rel="stylesheet" href="/QA/style/style.css">
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>

<body>

<div id="nav"></div>

<main>

<h1>Quiz</h1>

<p>
Selbstüberprüfung durch Quizfragen
</p>


<div class="card">

    <h2>Zwischenfrage</h2>

    <p>Welche Größe verändert sich, wenn ω erhöht wird?</p>

    <label><input type="radio" name="q1" value="a"> Amplitude</label><br>
    <label><input type="radio" name="q1" value="b"> Periodendauer</label><br><br>

    <button onclick="checkAnswer()">Prüfen</button>

    <p id="feedback" style="margin-top: 10px;"></p>

</div>



<script src="/QA/js/app.js"></script>
<script>

fetchNav();

// Quiz
function checkAnswer(){

    let selected = document.querySelector('input[name="q1"]:checked');
    let feedback = document.getElementById("feedback");

    if(!selected){
        feedback.textContent = "Bitte eine Antwort wählen.";
        return;
    }

    if(selected.value === "b"){
        feedback.textContent = "Richtig! Die Periodendauer hängt von ω ab.";
        feedback.style.color = "green";
    } else {
        feedback.textContent = "Nicht ganz. Überlege den Zusammenhang zwischen ω und T.";
        feedback.style.color = "red";
    }

    // automatisch zum Feedback scrollen
    feedback.scrollIntoView({ behavior: "smooth", block: "center" });
}

</script>

</main>
</body>
</html>
